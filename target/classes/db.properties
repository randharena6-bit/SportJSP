# SPORT CONNECT - Configuration Base de Données PostgreSQL
# Écosystème Numérique du Sport Malgache

# Configuration PostgreSQL
db.url=jdbc:postgresql://localhost:5432/sportconnect?serverTimezone=Africa/Nairobi&characterEncoding=UTF-8
db.username=postgres
db.password=postgres
db.driver=org.postgresql.Driver

# Pool de connexions (optionnel)
db.pool.minSize=5
db.pool.maxSize=20
db.pool.timeout=30000
