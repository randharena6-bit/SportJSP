# SPORT CONNECT - Configuration Base de Données
# Écosystème Numérique du Sport Malgache

# Configuration MySQL
db.url=jdbc:mysql://localhost:3306/sportconnect?useSSL=false&serverTimezone=Africa/Nairobi&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
